<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Calculadora</title><style>*{margin:0;padding:0}body{font-family:sans-serif;padding:20px;background:#f5f7fa}h1{color:#1a2a4e;margin:20px 0}input{width:100%;padding:10px;margin:10px 0;border:1px solid #ddd}button{background:#ff9500;color:#fff;padding:10px;width:100%;cursor:pointer}section{background:#fff;padding:20px;margin:20px 0}</style></head><body><section><h1>💳 Calculadora Hipotecaria</h1><label>Precio</label><input id="p" type="number" value="2500000"><label>Enganche %</label><input id="d" type="number" value="30"><label>Años</label><input id="t" type="number" value="20"><label>Banco</label><select id="b"><option value="7">G&T 7%</option><option value="7.2">Agro 7.2%</option><option value="7.5">Industrial 7.5%</option><option value="7.8">Santander 7.8%</option></select><button onclick="c()">CALCULAR</button></section><section id="r"></section><script>function c(){const p=+document.getElementById('p').value;const d=+document.getElementById('d').value;const t=+document.getElementById('t').value;const r=+document.getElementById('b').value;const down=p*(d/100);const loan=p-down;const mr=r/100/12;const m=t*12;const cu=loan*(mr*Math.pow(1+mr,m))/(Math.pow(1+mr,m)-1);const f=n=>'GTQ '+Math.round(n).toLocaleString();document.getElementById('r').innerHTML='<h2>Cuota Mensual</h2><p style="font-size:24px;color:#ff9500;font-weight:bold">'+f(cu)+'</p><p>Enganche: '+f(down)+'</p><p>Financiar: '+f(loan)+'</p>';}c();document.querySelectorAll('input,select').forEach(x=>x.addEventListener('change',c));</script></body></html>
