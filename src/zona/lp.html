<style>
:root{--ink:#0D1B3E;--ink2:#142240;--ink3:#1A3060;--or:#F5820D;--or2:#FF9B2E;--wh:#fff;--cream:#F0EBE1;--sv:#8A9BB0;--mt:#56647A;--bd:rgba(255,255,255,.08);--gl:rgba(245,130,13,.25);--wa:#25D366}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:'Montserrat',sans-serif;background:var(--ink);color:var(--wh);overflow-x:hidden;-webkit-font-smoothing:antialiased}

/* TOP BAR */
.lp-top{background:rgba(13,27,62,.97);border-bottom:1px solid var(--gl);padding:12px 6%;display:flex;align-items:center;justify-content:space-between}
.lp-logo{font-family:'Cormorant Garamond',serif;font-size:1rem;font-weight:600;letter-spacing:.2em;text-transform:uppercase;color:var(--wh);text-decoration:none}
.lp-logo em{font-style:normal;color:var(--or)}
.lp-badge{font-size:.5rem;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:var(--or);border:1px solid var(--gl);padding:4px 10px}

/* HERO IMAGE */
.lp-hero{position:relative;width:100%;height:60vh;min-height:380px;overflow:hidden}
.lp-hero img{width:100%;height:100%;object-fit:cover;filter:brightness(.75)}
.lp-hero-ov{position:absolute;inset:0;background:linear-gradient(to top,rgba(13,27,62,.95) 0%,rgba(13,27,62,.2) 40%,transparent 100%)}
.lp-hero-info{position:absolute;bottom:40px;left:6%;right:6%;z-index:2}
.lp-hero-tipo{font-size:.55rem;font-weight:700;letter-spacing:.25em;text-transform:uppercase;color:var(--or);margin-bottom:8px}
.lp-hero-title{font-family:'Cormorant Garamond',serif;font-size:clamp(1.8rem,4vw,3rem);font-weight:300;line-height:1.15;margin-bottom:8px}
.lp-hero-loc{font-size:.78rem;color:var(--sv);font-weight:300}
.lp-hero-price{font-family:'Cormorant Garamond',serif;font-size:clamp(1.4rem,3vw,2.2rem);color:var(--or);font-weight:400;margin-top:12px}

/* GALLERY THUMBS */
.lp-thumbs{display:flex;gap:2px;padding:2px 0;overflow-x:auto}
.lp-thumbs img{width:120px;height:80px;object-fit:cover;flex-shrink:0;filter:brightness(.7);cursor:pointer;transition:filter .2s}
.lp-thumbs img:hover{filter:brightness(1)}

/* SPECS */
.lp-specs{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:1px;background:var(--bd);margin:0}
.lp-spec{background:var(--ink2);padding:18px 16px;text-align:center}
.lp-spec-v{font-family:'Cormorant Garamond',serif;font-size:1.4rem;font-weight:400;color:var(--or);margin-bottom:4px}
.lp-spec-l{font-size:.52rem;font-weight:600;letter-spacing:.18em;text-transform:uppercase;color:var(--mt)}

/* BODY */
.lp-body{max-width:800px;margin:0 auto;padding:48px 6%}
.lp-desc{font-size:.88rem;color:var(--sv);line-height:1.9;font-weight:300;margin-bottom:32px}

/* CTA SECTION */
.lp-cta{background:linear-gradient(135deg,var(--ink3),var(--ink2));border-top:1px solid var(--gl);border-bottom:1px solid var(--gl);padding:48px 6%;text-align:center}
.lp-cta-title{font-family:'Cormorant Garamond',serif;font-size:clamp(1.4rem,3vw,2rem);font-weight:300;margin-bottom:8px}
.lp-cta-title em{font-style:italic;color:var(--or)}
.lp-cta-sub{font-size:.82rem;color:var(--sv);margin-bottom:28px;font-weight:300}
.lp-cta-btns{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;max-width:500px;margin:0 auto}

/* BUTTONS */
.btn-wa-big{display:inline-flex;align-items:center;gap:10px;background:var(--wa);color:var(--wh);padding:16px 32px;font-size:.75rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;text-decoration:none;transition:all .3s;flex:1;justify-content:center;min-width:200px}
.btn-wa-big:hover{background:#1ebe5d;transform:translateY(-2px);box-shadow:0 8px 24px rgba(37,211,102,.3)}
.btn-wa-big svg{width:20px;height:20px;fill:currentColor;flex-shrink:0}
.btn-call{display:inline-flex;align-items:center;gap:8px;background:transparent;color:var(--or);border:1px solid var(--gl);padding:16px 28px;font-size:.75rem;font-weight:600;letter-spacing:.12em;text-transform:uppercase;text-decoration:none;transition:all .3s;flex:1;justify-content:center;min-width:200px}
.btn-call:hover{background:var(--or);color:var(--ink);border-color:var(--or)}

/* TRUST */
.lp-trust{padding:32px 6%;display:flex;justify-content:center;gap:40px;flex-wrap:wrap}
.lp-trust-item{text-align:center}
.lp-trust-n{font-family:'Cormorant Garamond',serif;font-size:1.6rem;color:var(--or)}
.lp-trust-l{font-size:.5rem;font-weight:600;letter-spacing:.15em;text-transform:uppercase;color:var(--mt)}

/* LEAD FORM */
.lp-form-section{background:var(--ink);padding:48px 6%;text-align:center}
.lp-form-label{font-size:.55rem;font-weight:700;letter-spacing:.25em;text-transform:uppercase;color:var(--or);margin-bottom:8px}
.lp-form-title{font-family:'Cormorant Garamond',serif;font-size:clamp(1.4rem,3vw,2rem);font-weight:300;margin-bottom:6px}
.lp-form-title em{font-style:italic;color:var(--or)}
.lp-form-sub{font-size:.78rem;color:var(--sv);font-weight:300;margin-bottom:24px}
.lp-form{max-width:420px;margin:0 auto;display:flex;flex-direction:column;gap:12px}
.lp-form input{background:var(--ink2);border:1px solid var(--bd);color:var(--wh);padding:14px 16px;font-family:'Montserrat',sans-serif;font-size:.82rem;font-weight:300;outline:none;transition:border .3s;border-radius:0}
.lp-form input::placeholder{color:var(--mt)}
.lp-form input:focus{border-color:var(--or)}
.lp-form-btn{background:var(--or);color:var(--wh);border:none;padding:16px;font-family:'Montserrat',sans-serif;font-size:.72rem;font-weight:700;letter-spacing:.15em;text-transform:uppercase;cursor:pointer;transition:all .3s}
.lp-form-btn:hover{background:var(--or2);transform:translateY(-2px);box-shadow:0 8px 24px var(--gl)}
.lp-form-btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
.lp-form-ok{display:none;text-align:center;padding:20px}
.lp-form-ok .check{font-size:2rem;margin-bottom:8px;display:block}
.lp-form-ok p{font-size:.85rem;color:var(--sv);font-weight:300}
.lp-form-divider{display:flex;align-items:center;gap:12px;margin:8px 0}
.lp-form-divider span{font-size:.6rem;color:var(--mt);letter-spacing:.1em;text-transform:uppercase}
.lp-form-divider::before,.lp-form-divider::after{content:'';flex:1;height:1px;background:var(--bd)}

/* FOOTER MINI */
.lp-footer{text-align:center;padding:20px 6%;font-size:.6rem;color:var(--mt);border-top:1px solid var(--bd)}

/* STICKY BOTTOM CTA */
.lp-sticky{position:fixed;bottom:0;left:0;right:0;z-index:300;background:rgba(13,27,62,.97);backdrop-filter:blur(16px);border-top:1px solid var(--gl);padding:10px 4%;display:flex;gap:8px;transform:translateY(100%);transition:transform .3s}
.lp-sticky.visible{transform:translateY(0)}
.lp-sticky a{flex:1;display:flex;align-items:center;justify-content:center;gap:6px;padding:13px 8px;font-size:.65rem;font-weight:600;letter-spacing:.12em;text-transform:uppercase;text-decoration:none;transition:all .3s}
.lp-sticky .s-wa{background:var(--wa);color:var(--wh)}
.lp-sticky .s-call{background:transparent;color:var(--or);border:1px solid var(--gl)}

/* LOADING */
.lp-loading{display:flex;align-items:center;justify-content:center;min-height:60vh;flex-direction:column;gap:16px}
.lp-spinner{width:40px;height:40px;border:3px solid var(--bd);border-top-color:var(--or);border-radius:50%;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* RESPONSIVE */
@media(max-width:768px){
  .lp-hero{height:50vh;min-height:300px}
  .lp-thumbs img{width:90px;height:60px}
  .lp-cta-btns{flex-direction:column}
  .lp-trust{gap:24px}
  body{padding-bottom:64px}
}
@media(max-width:480px){
  .lp-hero{height:45vh}
  .lp-body{padding:28px 4%}
  .lp-cta{padding:32px 4%}
}
</style>

<script>
(function(){
  var WA = '50245542088';
  var API = 'https://zona-inmu.tours-virtuales-gt.workers.dev/api/public/propiedades';
  var params = new URLSearchParams(window.location.search);
  var slug = params.get('p') || '';

  // UTM tracking
  var utmSource = params.get('utm_source') || '';
  var utmCampaign = params.get('utm_campaign') || '';
  var utmTag = '';
  if (utmSource) utmTag += '[' + utmSource;
  if (utmCampaign) utmTag += '/' + utmCampaign;
  if (utmSource || utmCampaign) utmTag += ']';

  function waUrl(msg) {
    var full = msg + (utmTag ? ' ' + utmTag : '');
    return 'https://wa.me/' + WA + '?text=' + encodeURIComponent(full);
  }

  function esc(s) { var d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

  function formatPrice(raw) {
    if (!raw) return '';
    var s = String(raw).replace(/^\s*Q\.?\s*/i,'').replace(/^\s*\$\s*/,'').replace(/,/g,'');
    var n = parseFloat(s.replace(/[^0-9.]/g,''));
    if (isNaN(n) || n <= 0) return raw;
    if (n > 0 && n < 10) n = n * 10000000;
    var isUSD = String(raw).indexOf('$') >= 0 || String(raw).toUpperCase().indexOf('USD') >= 0;
    if (isUSD) return '$' + n.toLocaleString('en-US', {maximumFractionDigits:0});
    return 'Q. ' + n.toLocaleString('es-GT', {maximumFractionDigits:0});
  }

  if (!slug) {
    document.getElementById('lpContent').innerHTML = '<div class="lp-loading"><div style="font-size:1rem;color:var(--or)">Propiedad no especificada</div><a href="/propiedades.html" style="color:var(--sv);font-size:.8rem;margin-top:8px">Ver todas las propiedades &rarr;</a></div>';
    return;
  }

  // Fetch property
  var xhr = new XMLHttpRequest();
  xhr.open('GET', API);
  xhr.onload = function() {
    if (xhr.status !== 200) { showError(); return; }
    try {
      var props = JSON.parse(xhr.responseText);
      var prop = null;
      for (var i = 0; i < props.length; i++) {
        if (props[i].slug === slug) { prop = props[i]; break; }
      }
      if (!prop) { showError(); return; }
      renderProp(prop);
    } catch(e) { showError(); }
  };
  xhr.onerror = function() { showError(); };
  xhr.send();

  function showError() {
    document.getElementById('lpContent').innerHTML = '<div class="lp-loading"><div style="font-size:1rem;color:var(--or)">Propiedad no encontrada</div><a href="/propiedades.html" style="color:var(--sv);font-size:.8rem;margin-top:8px">Ver todas las propiedades &rarr;</a></div>';
  }

  function renderProp(p) {
    currentProp = p;
    var title = p.titulo || p.title || '';
    var tipo = p.tipo || '';
    var ciudad = p.municipio || p.ciudad || '';
    var price = formatPrice(p.precio || '');
    var habs = p.habitaciones || '';
    var banos = p.banos || '';
    var area = p.area || p.mt2 || '';
    var desc = p.descripcion || p.description || '';
    var imgs = p.imagenes || p.images || [];
    var mainImg = (imgs.length > 0) ? imgs[0] : 'https://ik.imagekit.io/Zona/logo.png';

    // Update page title
    document.title = title + ' | Zona INNmueble';

    // Fire ViewContent
    if (window.fbq) {
      fbq('track', 'ViewContent', {
        content_name: title,
        content_category: 'property_landing',
        content_ids: [slug],
        content_type: 'product',
        value: parseFloat(String(p.precio||'').replace(/[^0-9.]/g,'')) || 0,
        currency: String(p.precio||'').indexOf('Q') >= 0 ? 'GTQ' : 'USD'
      });
    }
    if (window.gtag) {
      gtag('event', 'view_item', { items: [{ item_id: slug, item_name: title, price: price }] });
    }

    // Build gallery thumbs
    var thumbsHtml = '';
    if (imgs.length > 1) {
      thumbsHtml = '<div class="lp-thumbs">';
      for (var i = 0; i < Math.min(imgs.length, 10); i++) {
        thumbsHtml += '<img src="' + esc(imgs[i]) + '" alt="' + esc(title) + ' foto ' + (i+1) + '" onclick="document.getElementById(\'heroImg\').src=this.src">';
      }
      thumbsHtml += '</div>';
    }

    // Build specs
    var specsHtml = '';
    var specs = [];
    if (habs && habs !== '0') specs.push(['lp-spec-v', habs, 'Habitaciones']);
    if (banos && banos !== '0') specs.push(['lp-spec-v', banos, 'Baños']);
    if (area && area !== '0') specs.push(['lp-spec-v', area, 'Metros²']);
    if (tipo) specs.push(['lp-spec-v', tipo, 'Tipo']);
    if (specs.length > 0) {
      specsHtml = '<div class="lp-specs">';
      for (var s = 0; s < specs.length; s++) {
        specsHtml += '<div class="lp-spec"><div class="' + specs[s][0] + '">' + esc(specs[s][1]) + '</div><div class="lp-spec-l">' + specs[s][2] + '</div></div>';
      }
      specsHtml += '</div>';
    }

    // Build description
    var descHtml = '';
    if (desc) {
      descHtml = '<div class="lp-body"><p class="lp-desc">' + esc(desc).replace(/\n/g, '<br>') + '</p></div>';
    }

    var html = ''
      + '<div class="lp-hero">'
      + '  <img id="heroImg" src="' + esc(mainImg) + '" alt="' + esc(title) + '">'
      + '  <div class="lp-hero-ov"></div>'
      + '  <div class="lp-hero-info">'
      + '    <div class="lp-hero-tipo">' + esc(tipo) + ' &middot; ' + esc(ciudad) + '</div>'
      + '    <h1 class="lp-hero-title">' + esc(title) + '</h1>'
      + '    <div class="lp-hero-price">' + esc(price) + '</div>'
      + '  </div>'
      + '</div>'
      + thumbsHtml
      + specsHtml
      + descHtml
      + '<div class="lp-form-section" id="contacto">'
      + '  <div class="lp-form-label">Solicitar información</div>'
      + '  <h2 class="lp-form-title">Recibe <em>asesoría personalizada</em></h2>'
      + '  <p class="lp-form-sub">Completa el formulario y un asesor te contactará en menos de 2 horas.</p>'
      + '  <form class="lp-form" id="leadForm" onsubmit="return submitLead(event)">'
      + '    <input type="text" name="name" placeholder="Tu nombre completo" required>'
      + '    <input type="tel" name="phone" placeholder="Número de teléfono" required>'
      + '    <input type="email" name="email" placeholder="Correo electrónico (opcional)">'
      + '    <button type="submit" class="lp-form-btn" id="formBtn">Solicitar información</button>'
      + '  </form>'
      + '  <div class="lp-form-ok" id="formOk">'
      + '    <span class="check">✓</span>'
      + '    <p>Gracias. Te redirigimos a WhatsApp para conectarte con un asesor.</p>'
      + '  </div>'
      + '  <div class="lp-form-divider"><span>o escríbenos directo</span></div>'
      + '  <div style="text-align:center;margin-top:8px">'
      + '    <a href="' + waUrl(waMsg) + '" target="_blank" rel="noopener" class="btn-wa-big" id="mainWa" onclick="fireLead()" style="display:inline-flex;max-width:420px;justify-content:center">'
      + '      <svg viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>'
      + '      Escribir por WhatsApp'
      + '    </a>'
      + '  </div>'
      + '</div>'
      + '<div class="lp-trust">'
      + '  <div class="lp-trust-item"><div class="lp-trust-n">26+</div><div class="lp-trust-l">Propiedades</div></div>'
      + '  <div class="lp-trust-item"><div class="lp-trust-n">50+</div><div class="lp-trust-l">Familias</div></div>'
      + '  <div class="lp-trust-item"><div class="lp-trust-n">10+</div><div class="lp-trust-l">Años</div></div>'
      + '  <div class="lp-trust-item"><div class="lp-trust-n">100%</div><div class="lp-trust-l">Asesoría</div></div>'
      + '</div>'
      + '<div class="lp-footer">&copy; 2026 Zona INNmueble &middot; Guatemala &middot; <a href="/privacidad.html" style="color:var(--mt)">Privacidad</a></div>';

    document.getElementById('lpContent').innerHTML = html;

    // Update sticky WA link
    document.getElementById('stickyWa').href = waUrl(waMsg);

    // Show sticky after scroll
    window.addEventListener('scroll', function() {
      var sticky = document.getElementById('lpSticky');
      if (window.scrollY > 300) {
        sticky.classList.add('visible');
      } else {
        sticky.classList.remove('visible');
      }
    });
  }

  // Store property data for form submission
  var currentProp = null;

  // Submit lead form
  window.submitLead = function(e) {
    e.preventDefault();
    var form = document.getElementById('leadForm');
    var btn = document.getElementById('formBtn');
    btn.disabled = true;
    btn.textContent = 'Enviando...';

    var formData = {
      name: form.name.value,
      phone: form.phone.value,
      email: form.email.value || '',
      property_slug: slug,
      property_name: currentProp ? (currentProp.titulo || currentProp.title || '') : '',
      page_url: window.location.href,
      utm_source: utmSource,
      utm_campaign: utmCampaign,
      utm_medium: params.get('utm_medium') || '',
      utm_content: params.get('utm_content') || '',
      user_agent: navigator.userAgent,
      fbc: getCookie('_fbc') || '',
      fbp: getCookie('_fbp') || ''
    };

    var xhr2 = new XMLHttpRequest();
    xhr2.open('POST', 'https://zona-inmu.tours-virtuales-gt.workers.dev/api/leads');
    xhr2.setRequestHeader('Content-Type', 'application/json');
    xhr2.onload = function() {
      form.style.display = 'none';
      document.getElementById('formOk').style.display = 'block';
      fireLead();
      // Auto-redirect a WhatsApp después de 1.5s
      var leadName = formData.name.split(' ')[0];
      var propTitle = formData.property_name || '';
      var waText = 'Hola, soy ' + leadName + '. Acabo de solicitar información sobre: ' + propTitle + '. Me gustaría recibir más detalles.';
      var waRedirect = 'https://wa.me/50245542088?text=' + encodeURIComponent(waText);
      setTimeout(function() {
        window.open(waRedirect, '_blank');
      }, 1500);
    };
    xhr2.onerror = function() {
      btn.disabled = false;
      btn.textContent = 'Solicitar información';
      alert('Error al enviar. Intenta de nuevo.');
    };
    xhr2.send(JSON.stringify(formData));
    return false;
  };

  function getCookie(name) {
    var match = document.cookie.match(new RegExp('(^| )' + name + '=([^;]+)'));
    return match ? match[2] : '';
  }

  // Lead event function (global)
  window.fireLead = function() {
    if (window.fbq) {
      fbq('track', 'Lead', { content_name: slug, content_category: 'landing_page_wa' });
    }
    if (window.gtag) {
      gtag('event', 'generate_lead', { event_category: 'landing_page', event_label: slug, value: 1 });
    }
  };

})();
</script>
