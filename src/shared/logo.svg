<svg viewBox="0 0 1600 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- Fondo -->
  <rect width="1600" height="1024" fill="#000000"/>
  
  <!-- Ícono Geométrico (más grande y prominente) -->
  <g transform="translate(120, 200)">
    <!-- Líneas principales - pirámide de red -->
    <line x1="220" y1="20" x2="80" y2="160" stroke="#1a5f9e" stroke-width="14" stroke-linecap="round" stroke-linejoin="round"/>
    <line x1="220" y1="20" x2="360" y2="160" stroke="#1a5f9e" stroke-width="14" stroke-linecap="round" stroke-linejoin="round"/>
    <line x1="80" y1="160" x2="160" y2="340" stroke="#1a5f9e" stroke-width="14" stroke-linecap="round" stroke-linejoin="round"/>
    <line x1="360" y1="160" x2="280" y2="340" stroke="#1a5f9e" stroke-width="14" stroke-linecap="round" stroke-linejoin="round"/>
    <line x1="80" y1="160" x2="360" y2="160" stroke="#1a5f9e" stroke-width="14" stroke-linecap="round" stroke-linejoin="round"/>
    <line x1="160" y1="340" x2="280" y2="340" stroke="#1a5f9e" stroke-width="14" stroke-linecap="round" stroke-linejoin="round"/>
    <line x1="160" y1="340" x2="220" y2="20" stroke="#1a5f9e" stroke-width="14" stroke-linecap="round" stroke-linejoin="round"/>
    <line x1="280" y1="340" x2="220" y2="20" stroke="#1a5f9e" stroke-width="14" stroke-linecap="round" stroke-linejoin="round"/>
    <line x1="160" y1="340" x2="280" y2="160" stroke="#1a5f9e" stroke-width="12" stroke-linecap="round" stroke-linejoin="round" opacity="0.7"/>
    <line x1="280" y1="340" x2="160" y2="160" stroke="#1a5f9e" stroke-width="12" stroke-linecap="round" stroke-linejoin="round" opacity="0.7"/>
    
    <!-- Puntos de conexión -->
    <circle cx="220" cy="20" r="28" fill="#ffa500" filter="url(#glow)"/>
    <circle cx="80" cy="160" r="18" fill="#1a5f9e"/>
    <circle cx="360" cy="160" r="18" fill="#1a5f9e"/>
    <circle cx="160" cy="340" r="18" fill="#1a5f9e"/>
    <circle cx="280" cy="340" r="18" fill="#1a5f9e"/>
  </g>
  
  <!-- Definir glow effect -->
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Texto principal - INMUHUB (más grande) -->
  <text x="600" y="380" font-family="'Arial', 'Helvetica', sans-serif" font-size="280" font-weight="800" letter-spacing="-8" fill="#1a5f9e" font-smoothing="antialiased">INMU</text>
  <text x="1320" y="380" font-family="'Arial', 'Helvetica', sans-serif" font-size="280" font-weight="800" letter-spacing="-8" fill="#ffa500">HUB</text>
  
  <!-- Tagline - mejorado -->
  <text x="600" y="480" font-family="'Arial', 'Helvetica', sans-serif" font-size="64" font-weight="300" fill="#888888" letter-spacing="2">La Red Profesional Inmobiliaria</text>
  
  <!-- Línea decorativa -->
  <line x1="600" y1="520" x2="1400" y2="520" stroke="#ffa500" stroke-width="4" opacity="0.6"/>
</svg>
