<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Admin</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 900px; margin: 50px auto; padding: 20px; }
    h1 { color: #0066CC; }
    input, textarea, select { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 4px; }
    button { background: #0066CC; color: white; padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; }
    button:hover { background: #0052A3; }
    .property { border: 1px solid #ddd; padding: 15px; margin: 10px 0; border-radius: 4px; }
    .property h3 { margin: 0 0 10px 0; }
    .property button { background: #dc2626; margin: 0; }
  </style>
</head>
<body>
  <h1>🏠 Admin Inmuhub</h1>

  <h2>Agregar Propiedad</h2>
  <form id="f">
    <input type="text" id="t" placeholder="Título" required>
    <input type="text" id="l" placeholder="Ubicación" required>
    <input type="text" id="ty" placeholder="Tipo" required>
    <input type="number" id="p" placeholder="Precio" required>
    <textarea id="d" placeholder="Descripción"></textarea>
    <button type="submit">Agregar</button>
  </form>

  <h2>Propiedades</h2>
  <div id="list"></div>

  <script>
    const get = () => JSON.parse(localStorage.getItem('props') || '[]');
    const set = (d) => localStorage.setItem('props', JSON.stringify(d));

    function show() {
      const props = get();
      const html = props.length === 0 ? '<p>Sin propiedades</p>' : props.map((p, i) => `
        <div class="property">
          <h3>${p.t}</h3>
          <p><strong>${p.l}</strong> | ${p.ty} | $${p.p}</p>
          ${p.d ? `<p>${p.d}</p>` : ''}
          <button onclick="remove(${i})">Eliminar</button>
        </div>
      `).join('');
      document.getElementById('list').innerHTML = html;
    }

    document.getElementById('f').addEventListener('submit', (e) => {
      e.preventDefault();
      const props = get();
      props.push({
        t: document.getElementById('t').value,
        l: document.getElementById('l').value,
        ty: document.getElementById('ty').value,
        p: document.getElementById('p').value,
        d: document.getElementById('d').value
      });
      set(props);
      document.getElementById('f').reset();
      show();
      alert('✅ Propiedad agregada');
    });

    function remove(i) {
      if (!confirm('¿Eliminar?')) return;
      const props = get();
      props.splice(i, 1);
      set(props);
      show();
    }

    show();
  </script>
</body>
</html>
